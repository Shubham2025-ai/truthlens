services:
  - type: web
    name: truthlens-api
    env: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: APP_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true