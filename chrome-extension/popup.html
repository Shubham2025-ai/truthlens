<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 360px;
    min-height: 200px;
    background: #0d0d0d;
    color: #fafaf8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: #111;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .brand span { color: #e74c3c; }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    font-family: monospace;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2ecc71;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .body { padding: 16px 18px; }

  .url-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 11px;
    font-family: monospace;
    color: rgba(255,255,255,0.4);
    word-break: break-all;
    max-height: 40px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .analyze-btn {
    width: 100%;
    background: #c0392b;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 10px;
  }
  .analyze-btn:hover { background: #e74c3c; }
  .analyze-btn:active { transform: scale(0.98); }
  .analyze-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

  .open-btn {
    width: 100%;
    background: transparent;
    color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 9px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .open-btn:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); }

  .loading {
    text-align: center;
    padding: 20px 0;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #e74c3c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: rgba(255,255,255,0.4); }

  .result { padding: 4px 0; }

  .score-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .score-card {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .score-num {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .score-lbl {
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .bias-row {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .bias-label-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .bias-name { font-weight: 600; }
  .bias-conf { color: rgba(255,255,255,0.3); font-size: 11px; }
  .bias-track {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
  }

  .manip-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 12px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
  }
  .manip-label { color: rgba(255,255,255,0.5); }

  .view-full-btn {
    width: 100%;
    background: #c0392b;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .view-full-btn:hover { background: #e74c3c; }

  .error-box {
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="brand">Truth<span>Lens</span></div>
  <div class="live-badge"><div class="dot"></div> AI</div>
</div>

<div class="body">
  <div class="url-box" id="url-display">Loading current page...</div>

  <div id="view-main">
    <button class="analyze-btn" id="analyze-btn" onclick="startAnalysis()">
      🔍 Analyze This Article
    </button>
    <button class="open-btn" onclick="openApp()">Open TruthLens App ↗</button>
  </div>

  <div id="view-loading" style="display:none;">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">Fetching article...</div>
    </div>
  </div>

  <div id="view-result" style="display:none;">
    <div class="result" id="result-content"></div>
    <button class="view-full-btn" id="view-full-btn">View Full Report ↗</button>
  </div>

  <div id="view-error" style="display:none;">
    <div class="error-box" id="error-text"></div>
    <button class="open-btn" onclick="openApp()">Open TruthLens App ↗</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
